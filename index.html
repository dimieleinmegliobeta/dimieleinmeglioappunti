<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BeeDoc AI - Forza Bruta</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #fdfdfd; }
        .box { background: white; border: 2px solid #ffcc00; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #333; color: white; font-weight: bold; cursor: pointer; border: none; }
        textarea { width: 100%; height: 250px; margin-top: 20px; border-radius: 8px; border: 1px solid #eee; padding: 10px; box-sizing: border-box; font-family: monospace; }
        #s { font-weight: bold; margin: 10px 0; color: #d35400; }
        #err { font-size: 11px; color: red; background: #fff0f0; padding: 10px; margin-top: 10px; border-radius: 5px; display: none; text-align: left; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🐝 BeeDoc AI</h1>
        <p>Prova il modello Flash-8B (Ultra Compatibile)</p>
        <input type="password" id="k" placeholder="Chiave API">
        <input type="file" id="f" accept="image/*">
        <button id="go">AVVIA ANALISI</button>
        <div id="s">Stato: Pronto</div>
        <textarea id="o" placeholder="Risultato..."></textarea>
        <div id="err"></div>
    </div>

    <script>
        document.getElementById('go').onclick = async () => {
            const key = document.getElementById('k').value.trim();
            const file = document.getElementById('f').files[0];
            const status = document.getElementById('s');
            const out = document.getElementById('o');
            const errDiv = document.getElementById('err');

            if(!key || !file) return alert("Manca qualcosa!");

            status.innerText = "⏳ Tentativo con Gemini 1.5 Flash 8B...";
            errDiv.style.display = "none";
            out.value = "";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = async () => {
                const b64 = reader.result.split(',')[1];
                
                // QUESTO È IL MODELLO CHE GOOGLE STA SPINGENDO ORA PER LE CHIAVI FREE
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${key}`;
                
                try {
                    const r = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{parts: [
                                {text: "Trascrivi fedelmente questo registro apistico. Dividi per date."},
                                {inline_data: {mime_type: file.type, data: b64}}
                            ]}]
                        })
                    });

                    const d = await r.json();

                    if(d.candidates && d.candidates[0].content) {
                        out.value = d.candidates[0].content.parts[0].text;
                        status.innerText = "✅ VITTORIA! CE L'ABBIAMO FATTA!";
                    } else {
                        status.innerText = "❌ Ancora errore dal server.";
                        errDiv.innerText = "Errore: " + (d.error ? d.error.message : JSON.stringify(d));
                        errDiv.style.display = "block";
                    }
                } catch(error) {
                    status.innerText = "❌ Errore di rete.";
                    errDiv.innerText = error.message;
                    errDiv.style.display = "block";
                }
            };
        };
    </script>
</body>
</html>
