<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BeeDoc AI - Scanner Registro</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 550px; border-top: 5px solid #ffcc00; }
        h1 { margin: 0 0 10px 0; color: #333; }
        input, button, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #333; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #555; }
        #downloadBtn { background: #0066cc; display: none; margin-top: 15px; }
        #status { font-weight: bold; color: #d35400; margin: 10px 0; font-size: 0.9em; }
        textarea { height: 300px; background: #fcfcfc; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🐝 BeeDoc AI</h1>
    <p style="color: #666; font-size: 0.85em;">Versione Diagnostica (Scanner Documenti)</p>

    <input type="password" id="apiKey" placeholder="Incolla Chiave API (AIza...)">
    <input type="file" id="fileInput" accept="image/*">
    
    <button id="processBtn">AVVIA ANALISI</button>
    
    <div id="status">Stato: In attesa</div>
    
    <textarea id="output" placeholder="Il risultato apparirà qui..."></textarea>
    
    <button id="downloadBtn">📄 SCARICA .DOC</button>
</div>

<script>
const processBtn = document.getElementById('processBtn');
const downloadBtn = document.getElementById('downloadBtn');
const status = document.getElementById('status');
const output = document.getElementById('output');

processBtn.onclick = async () => {
    const key = document.getElementById('apiKey').value.trim();
    const file = document.getElementById('fileInput').files[0];

    if (!key || !file) {
        alert("Inserisci la chiave API e seleziona un'immagine.");
        return;
    }

    status.style.color = "#d35400";
    status.innerText = "⏳ Conversione immagine...";

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onloadend = async () => {
        const base64Data = reader.result.split(',')[1];
        const mimeType = file.type;

        const model = "gemini-1.5-flash"; 
        status.innerText = `⏳ Analisi con ${model} in corso...`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Estrai tutto il testo da questo registro. Mantieni la formattazione tabellare se presente e correggi eventuali errori di lettura OCR. Restituisci solo il testo del documento." },
                            { inline_data: { mime_type: mimeType, data: base64Data } }
                        ]
                    }]
                })
            });

            const data = await response.json();

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const resultText = data.candidates[0].content.parts[0].text;
                output.value = resultText;
                status.innerText = "✅ Analisi completata!";
                status.style.color = "green";
                downloadBtn.style.display = "block";
            } else {
                throw new Error(data.error?.message || "Errore nella risposta dell'AI");
            }
        } catch (err) {
            console.error(err);
            status.innerText = "❌ Errore: " + err.message;
            status.style.color = "red";
        }
    };
};

// Funzione per scaricare il file .doc
downloadBtn.onclick = () => {
    const text = output.value;
    const blob = new Blob(['\ufeff', text], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'registro_digitalizzato.doc';
    link.click();
};
</script>

</body>
</html>
