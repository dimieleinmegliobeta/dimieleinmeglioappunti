<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeeDoc AI - Versione Nonno</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 550px; border-top: 5px solid #ffcc00; }
        h1 { color: #444; margin-top: 0; text-align: center; }
        p { color: #666; font-size: 0.9em; text-align: center; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #333; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1em; transition: 0.3s; }
        button:hover { background: #000; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { text-align: center; font-weight: bold; margin: 15px 0; color: #d35400; min-height: 1.2em; }
        textarea { width: 100%; height: 250px; margin-top: 15px; border-radius: 10px; border: 1px solid #eee; padding: 15px; box-sizing: border-box; font-family: monospace; background: #fafafa; line-height: 1.5; }
        #error-display { font-size: 11px; color: #721c24; background: #f8d7da; border: 1px solid #f5c6cb; padding: 10px; margin-top: 10px; border-radius: 5px; display: none; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐝 BeeDoc AI</h1>
        <p>Versione Ultra-Compatibile (Pro Vision)</p>
        
        <div class="input-group">
            <label for="apiKey">Chiave API Gemini:</label>
            <input type="password" id="apiKey" placeholder="Incolla qui la tua chiave">
        </div>

        <div class="input-group">
            <label for="imageInput">Foto del Registro:</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <button id="btnAvvia">ANALIZZA REGISTRO</button>
        
        <div id="status">Pronto all'uso</div>
        
        <textarea id="output" placeholder="La trascrizione apparirà qui..."></textarea>
        
        <div id="error-display"></div>
    </div>

    <script>
        const btn = document.getElementById('btnAvvia');
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        const errorDisplay = document.getElementById('error-display');

        btn.onclick = async () => {
            const key = document.getElementById('apiKey').value.trim();
            const fileInput = document.getElementById('imageInput');
            const file = fileInput.files[0];

            if (!key || !file) {
                alert("Per favore, inserisci la chiave e seleziona una foto!");
                return;
            }

            // Reset interfaccia
            btn.disabled = true;
            status.innerText = "⏳ Collegamento al server 'Nonno'...";
            output.value = "";
            errorDisplay.style.display = "none";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = async () => {
                try {
                    const base64Data = reader.result.split(',')[1];
                    
                    // INDIRIZZO STORICO GEMINI PRO VISION
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro-vision:generateContent?key=${key}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Trascrivi integralmente questo registro di apicoltura, organizzandolo per date e mantenendo i termini tecnici (FAM, Nuclei, R, Celle)." },
                                    { inline_data: { mime_type: file.type, data: base64Data } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();

                    if (data.candidates && data.candidates[0].content) {
                        output.value = data.candidates[0].content.parts[0].text;
                        status.innerText = "✅ TRASCRIZIONE RIUSCITA!";
                    } else {
                        status.innerText = "❌ Google ha rifiutato la richiesta.";
                        errorDisplay.innerText = "Dettaglio Errore: " + (data.error ? data.error.message : JSON.stringify(data));
                        errorDisplay.style.display = "block";
                    }
                } catch (err) {
                    status.innerText = "❌ Errore di connessione.";
                    errorDisplay.innerText = err.message;
                    errorDisplay.style.display = "block";
                } finally {
                    btn.disabled = false;
                }
            };
        };
    </script>
</body>
</html>
