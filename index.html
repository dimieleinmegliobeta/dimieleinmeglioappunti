<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BeeDoc AI - Auto-Scanner</title>
</head>
<body style="font-family:sans-serif; text-align:center; padding:30px; background:#f4f4f4;">
    <div style="background:white; padding:30px; border-radius:15px; max-width:500px; margin:auto;">
        <h1>🐝 BeeDoc AI</h1>
        <input type="password" id="k" placeholder="Incolla API Key" style="width:90%; padding:10px; margin:10px;">
        <input type="file" id="f" style="margin:20px;">
        <button id="go" style="padding:15px; width:90%; cursor:pointer;">AVVIA SCANSIONE E ANALISI</button>
        <p id="s" style="font-weight:bold; color:orange;">Stato: Pronto</p>
        <textarea id="o" style="width:90%; height:200px; margin-top:10px;"></textarea>
    </div>

    <script>
        document.getElementById('go').onclick = async () => {
            const k = document.getElementById('k').value.trim();
            const f = document.getElementById('f').files[0];
            const s = document.getElementById('s');
            const o = document.getElementById('o');

            if(!k || !f) return alert("Manca chiave o foto!");

            s.innerText = "⏳ Ricerca modelli disponibili...";
            
            const reader = new FileReader();
            reader.readAsDataURL(f);
            reader.onloadend = async () => {
                const b64 = reader.result.split(',')[1];
                
                // Proviamo i 3 nomi "varianti" che Google usa in Europa nel 2026
                const modelliDaProvare = [
                    "gemini-1.5-flash-latest",
                    "gemini-1.5-flash",
                    "gemini-1.5-pro"
                ];

                for (let m of modelliDaProvare) {
                    s.innerText = `⏳ Tentativo con ${m}...`;
                    try {
                        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${k}`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                contents: [{parts: [{text: "Trascrivi integralmente."}, {inline_data: {mime_type: f.type, data: b64}}]}]
                            })
                        });
                        const d = await r.json();
                        
                        if(d.candidates) {
                            o.value = d.candidates[0].content.parts[0].text;
                            s.innerText = `✅ FUNZIONA! (Usato: ${m})`;
                            return; // Esci dal ciclo se uno funziona
                        }
                    } catch(e) {}
                }
                
                s.innerText = "❌ Nessun modello trovato. Google blocca la chiave.";
                o.value = "Suggerimento: Se la chat funziona ma l'API no, Google sta limitando la tua chiave API per motivi regionali. L'unica soluzione è creare la chiave usando un account Gmail diverso (non aziendale).";
            };
        };
    </script>
</body>
</html>
