<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeeDoc AI - Versione Stabile</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: #ccaa00; margin: 0; }
        .field { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #333; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        button:disabled { background: #ccc; }
        #status { text-align: center; color: #d35400; font-weight: bold; margin: 15px 0; font-size: 0.9em; }
        textarea { width: 100%; height: 250px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; font-family: monospace; }
        .error-log { font-size: 12px; color: red; background: #fff0f0; padding: 10px; border-radius: 5px; display: none; margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <header>
        <h1>🐝 BeeDoc AI</h1>
        <p>Digitalizzazione Registri Apistici</p>
    </header>

    <div class="container">
        <div class="field">
            <label for="apiKey">Chiave API Gemini:</label>
            <input type="password" id="apiKey" placeholder="Incolla la tua chiave API qui">
        </div>

        <div class="field">
            <label for="imageFile">Foto del Registro:</label>
            <input type="file" id="imageFile" accept="image/*">
        </div>

        <button id="startBtn">AVVIA TRASCRIZIONE</button>
        <div id="status">Pronto.</div>
        
        <textarea id="resultText" placeholder="Il testo apparirà qui..."></textarea>
        <div id="errorLog" class="error-log"></div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const resultText = document.getElementById('resultText');
        const errorLog = document.getElementById('errorLog');

        startBtn.addEventListener('click', async () => {
            const key = document.getElementById('apiKey').value.trim();
            const fileInput = document.getElementById('imageFile');
            
            if (!key || !fileInput.files[0]) {
                alert("Inserisci la chiave e seleziona una foto!");
                return;
            }

            startBtn.disabled = true;
            status.innerText = "⏳ Preparazione immagine...";
            errorLog.style.display = "none";
            resultText.value = "";

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];
                
                // Proviamo i 3 nomi di modelli più comuni che Google accetta
                const models = [
                    "gemini-1.5-flash",
                    "gemini-1.5-flash-latest",
                    "gemini-pro-vision" 
                ];

                let success = false;
                let lastErrorMessage = "";

                for (let modelName of models) {
                    if (success) break;

                    status.innerText = `🔍 Tentativo con modello: ${modelName}...`;

                    // Proviamo sia v1 che v1beta per ogni modello
                    const versions = ["v1beta", "v1"];
                    
                    for (let ver of versions) {
                        const url = `https://generativelanguage.googleapis.com/${ver}/models/${modelName}:generateContent?key=${key}`;
                        
                        try {
                            const response = await fetch(url, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    contents: [{ parts: [
                                        { text: "Trascrivi questo registro apistico in modo testuale, mantieni le date e i dettagli tecnici come FAM, Nuclei, R, Celle." },
                                        { inline_data: { mime_type: file.type, data: base64Data } }
                                    ]}]
                                })
                            });

                            const data = await response.json();

                            if (data.candidates && data.candidates[0].content) {
                                resultText.value = data.candidates[0].content.parts[0].text;
                                status.innerText = "✅ Trascrizione completata!";
                                success = true;
                                break;
                            } else if (data.error) {
                                lastErrorMessage = `${modelName} (${ver}): ${data.error.message}`;
                                console.log("Fallito:", lastErrorMessage);
                            }
                        } catch (e) {
                            lastErrorMessage = "Errore di connessione.";
                        }
                        if (success) break;
                    }
                }

                if (!success) {
                    status.innerText = "❌ Errore durante l'analisi";
                    errorLog.innerText = "Google non ha accettato la richiesta.\nUltimo errore: " + lastErrorMessage;
                    errorLog.style.display = "block";
                }
                startBtn.disabled = false;
            };

            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
