<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BeeDoc AI - Scanner Registro</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 550px; border-top: 5px solid #ffcc00; }
        h1 { margin: 0 0 10px 0; color: #333; text-align: center; }
        input, button, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        
        button { background: #333; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #444; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* Stile per il pulsante Word (nascosto all'inizio) */
        #downloadBtn { 
            background: #2b5797; 
            display: none; 
            margin-top: 15px;
        }

        #status { font-weight: bold; padding: 10px; margin: 10px 0; border-radius: 5px; font-size: 0.9em; text-align: center; background: #f9f9f9; color: #666; }
        textarea { height: 350px; font-family: monospace; font-size: 13px; background: #fafafa; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h1>🐝 BeeDoc AI</h1>
    <p style="text-align: center; color: #888; font-size: 0.8em; margin-top: -10px;">Analisi Documenti Apistici</p>

    <input type="password" id="apiKey" placeholder="Incolla Chiave API (AIza...)">
    <input type="file" id="fileInput" accept="image/*">
    
    <button id="processBtn">AVVIA SCANSIONE</button>
    
    <div id="status">In attesa di file e chiave...</div>
    
    <textarea id="output" placeholder="La trascrizione apparirà qui..."></textarea>

    <button id="downloadBtn">📄 SCARICA TRASCRIZIONE (.DOC)</button>
</div>

<script>
const processBtn = document.getElementById('processBtn');
const downloadBtn = document.getElementById('downloadBtn');
const status = document.getElementById('status');
const output = document.getElementById('output');

processBtn.onclick = async () => {
    const key = document.getElementById('apiKey').value.trim();
    const file = document.getElementById('fileInput').files[0];

    if (!key || !file) {
        alert("Inserisci chiave e seleziona un file.");
        return;
    }

    const modelAlias = "gemini-flash-latest"; 
    status.innerText = "⏳ Analisi in corso...";
    status.style.color = "orange";
    processBtn.disabled = true;
    downloadBtn.style.display = "none";
    output.value = "";

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onloadend = async () => {
        const base64Data = reader.result.split(',')[1];
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelAlias}:generateContent?key=${key}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Trascrivi integralmente il testo contenuto in questa immagine, mantenendo la formattazione originale riga per riga." },
                            { inline_data: { mime_type: file.type, data: base64Data } }
                        ]
                    }]
                })
            });

            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            if (data.candidates && data.candidates[0].content) {
                output.value = data.candidates[0].content.parts[0].text;
                status.innerText = "✅ Trascrizione completata";
                status.style.color = "green";
                downloadBtn.style.display = "block"; 
            } else {
                throw new Error("Nessun testo trovato nell'immagine.");
            }
        } catch (err) {
            status.innerText = "❌ ERRORE: " + err.message;
            status.style.color = "red";
        } finally {
            processBtn.disabled = false;
        }
    };
};

downloadBtn.onclick = () => {
    const text = output.value;
    const blob = new Blob(['\ufeff', text], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'BeeDoc_Trascrizione.doc';
    link.click();
    URL.revokeObjectURL(url);
};
</script>

</body>
</html>
