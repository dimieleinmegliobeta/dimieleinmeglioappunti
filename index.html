<!DOCTYPE html>
<html>
<head>
    <title>BeeDoc AI - Ultima Speranza</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #fafafa; }
        .box { background: white; border: 2px solid #ffcc00; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; }
        input, button { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #333; color: white; font-weight: bold; cursor: pointer; }
        textarea { width: 90%; height: 200px; margin-top: 20px; }
        #log { font-size: 10px; color: red; text-align: left; padding: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🐝 BeeDoc AI</h1>
        <input type="password" id="k" placeholder="Incolla Chiave API">
        <input type="file" id="f" accept="image/*">
        <button id="go">LEGGI REGISTRO</button>
        <div id="s">Stato: Pronto</div>
        <textarea id="o"></textarea>
        <div id="log"></div>
    </div>

    <script>
        document.getElementById('go').onclick = async () => {
            const key = document.getElementById('k').value;
            const file = document.getElementById('f').files[0];
            if(!key || !file) return alert("Manca qualcosa!");

            document.getElementById('s').innerText = "⏳ Sto bussando a Google...";
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = async () => {
                const b64 = reader.result.split(',')[1];
                
                // USIAMO IL MODELLO PIÙ COMPATIBILE IN ASSOLUTO
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${key}`;
                
                try {
                    const r = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{parts: [{text: "Trascrivi il testo di questa foto."}, {inline_data: {mime_type: file.type, data: b64}}]}]
                        })
                    });
                    const d = await r.json();
                    if(d.candidates) {
                        document.getElementById('o').value = d.candidates[0].content.parts[0].text;
                        document.getElementById('s').innerText = "✅ CE L'ABBIAMO FATTA!";
                    } else {
                        document.getElementById('log').innerText = JSON.stringify(d.error);
                        document.getElementById('s').innerText = "❌ Niente da fare.";
                    }
                } catch(e) {
                    document.getElementById('s').innerText = "❌ Errore connessione.";
                }
            };
        };
    </script>
</body>
</html>
