<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BeeDoc AI - Reset Geografico</title>
</head>
<body style="font-family:sans-serif; text-align:center; padding:30px; background:#f4f4f4;">
    <div style="background:white; padding:20px; border-radius:15px; max-width:500px; margin:auto; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
        <h1>🐝 BeeDoc AI</h1>
        <p style="font-size:0.8em; color:red;">Tentativo di bypass blocco regionale</p>
        <input type="password" id="api" placeholder="Incolla Chiave API" style="width:80%; padding:10px; margin:10px;"><br>
        <input type="file" id="foto" style="margin:20px;"><br>
        <button id="vai" style="padding:15px 30px; background:#333; color:white; border:none; border-radius:10px; cursor:pointer;">AVVIA ANALISI</button>
        <p id="stato" style="font-weight:bold; color:orange;">Stato: Pronto</p>
        <textarea id="risultato" style="width:90%; height:200px; padding:10px;"></textarea>
    </div>

    <script>
        document.getElementById('vai').onclick = async () => {
            const k = document.getElementById('api').value.trim();
            const f = document.getElementById('foto').files[0];
            const s = document.getElementById('stato');
            if(!k || !f) return alert("Manca chiave o foto!");

            s.innerText = "⏳ Forzatura connessione...";
            const reader = new FileReader();
            reader.readAsDataURL(f);
            reader.onloadend = async () => {
                const b64 = reader.result.split(',')[1];
                
                // CAMBIAMENTO CHIAVE: Usiamo v1 invece di v1beta e il modello specifico 1.5-flash-latest
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${k}`;
                
                try {
                    const r = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{parts: [
                                {text: "Trascrivi accuratamente questo registro apistico."},
                                {inline_data: {mime_type: f.type, data: b64}}
                            ]}]
                        })
                    });
                    
                    const d = await r.json();
                    
                    if(d.candidates) {
                        document.getElementById('risultato').value = d.candidates[0].content.parts[0].text;
                        s.innerText = "✅ FUNZIONA!";
                    } else if (d.error && d.error.status === "PERMISSION_DENIED") {
                        s.innerText = "❌ Blocco Regionale (EU/Italy)";
                        document.getElementById('risultato').value = "Google sta bloccando l'accesso gratuito dall'Italia per questa API specifica. Devi attivare un 'Billing Account' (anche senza pagare) su Google Cloud per sbloccarla.";
                    } else {
                        s.innerText = "❌ Errore Google: " + (d.error ? d.error.message : "Sconosciuto");
                    }
                } catch(e) { s.innerText = "❌ Errore rete"; }
            };
        };
    </script>
</body>
</html>
